<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>焦点漫游</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"/>
<script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="spots_data.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f0f0eb;--surface3:#e8e8e3;
  --border:#e0ddd5;--border2:#d0cdc5;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --primary:#2a6df0;--primary-soft:rgba(42,109,240,.1);--primary-glow:rgba(42,109,240,.25);
  --green:#22c55e;--green-soft:rgba(34,197,94,.1);
  --yellow:#f59e0b;--yellow-soft:rgba(245,158,11,.1);
  --red:#ef4444;--red-soft:rgba(239,68,68,.1);
  --purple:#8b5cf6;--purple-soft:rgba(139,92,246,.1);
  --orange:#f97316;--orange-soft:rgba(249,115,22,.1);
  --r:12px;--r-sm:8px;--r-lg:18px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --shadow-lg:0 12px 32px rgba(0,0,0,.15);
  --tb:#1e1e2e;--tb-text:#e0e0e0;--tb-text2:#888;--tb-border:rgba(255,255,255,.08);
}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;font-size:14px}
/* topbar */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:1000;flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.search-wrap{flex:0 1 280px;position:relative}
.search-wrap input{width:100%;padding:7px 34px 7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;transition:all .2s;font-family:inherit}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--primary);background:var(--surface)}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;font-size:15px}
#searchDrop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--r);max-height:300px;overflow-y:auto;z-index:2000;display:none;box-shadow:var(--shadow-lg)}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;display:flex;align-items:center;gap:10px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover,.sr-item.sel{background:var(--surface2)}
.sr-name{font-size:13px;font-weight:600;color:var(--text)}
.sr-addr{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;gap:4px;align-items:center;margin-left:auto}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;flex-shrink:0;transition:all .15s}
.icon-btn:hover{background:var(--surface3);color:var(--text)}
.icon-btn:active{transform:scale(.93)}
.icon-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.topbar-label{font-size:12px;color:var(--text3);margin-left:6px;white-space:nowrap}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--surface3);cursor:pointer;position:relative;transition:background .25s;border:0;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{left:19px}
/* dropdowns */
.hov-wrap{position:relative}
.hov-bridge{position:absolute;top:100%;left:0;right:0;height:8px;z-index:2999}
.hov-wrap .hov-drop{position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px;z-index:3000;display:none!important;box-shadow:var(--shadow-lg);min-width:230px;max-height:80vh;overflow-y:auto}
.hov-wrap.open .hov-bridge,.hov-wrap.open .hov-drop{display:block!important}
.dd-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding:2px 8px}
.dd-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;transition:background .12s;color:var(--text);position:relative}
.dd-item:hover{background:var(--surface2)}
.dd-arrow{margin-left:auto;color:var(--text3);font-size:12px}
.dd-sep{height:1px;background:var(--border);margin:4px 0}
.dd-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;gap:10px;border-radius:8px}
.dd-row:hover{background:var(--surface2)}
.dd-label{font-size:13px}
.dd-btn{width:100%;padding:7px 8px;border-radius:8px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;margin-top:4px;transition:background .15s;text-align:left;font-family:inherit}
.dd-btn:hover{background:var(--surface3)}
.dd-btn.danger{color:var(--red)}
.submenu{position:absolute;right:calc(100% + 8px);top:0;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:6px;min-width:170px;box-shadow:var(--shadow-lg);display:none;z-index:4000}
.dd-item:hover>.submenu{display:block}
.user-info-row{display:flex;align-items:center;gap:12px;padding:8px 8px 12px;border-bottom:1px solid var(--border);margin-bottom:6px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;overflow:hidden;color:#fff}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-name{font-size:14px;font-weight:600}
.user-email{font-size:11px;color:var(--text3);margin-top:2px}
/* layout — card-in-background */
.main{flex:1;display:flex;overflow:hidden;position:relative;background:var(--surface2);padding:12px}
.main-inner{flex:1;display:flex;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-md);overflow:hidden;border:1px solid var(--border)}
.map-wrap{flex:1;order:2;padding:10px 10px 10px 0;min-width:0;display:flex}
#map{width:100%;height:100%;border-radius:var(--r);overflow:hidden}
/* left panel */
#sidePanel{width:40%;min-width:340px;max-width:480px;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;order:1;position:relative}
#sidePanel.collapsed{width:0;min-width:0;overflow:hidden}
#panelTab{display:none}
#sidePanel:hover #panelTab,#panelTab:hover{opacity:1}
/* info bar */
.info-bar{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:12px;color:var(--text2)}
/* panel search */
.lp-search{padding:12px 16px 8px;flex-shrink:0}
.lp-search-input{width:100%;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;outline:none;transition:border-color .2s;font-family:inherit}
.lp-search-input:focus{border-color:var(--primary)}
.lp-search-input::placeholder{color:var(--text3)}
/* scene tags */
.scene-tags{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.scene-tag{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.scene-tag:hover{border-color:var(--primary);color:var(--primary)}
.scene-tag.on{border-color:var(--primary);color:#fff;background:var(--primary)}
/* scroll area */
.lp-scroll{flex:1;overflow-y:auto;padding:0 16px 24px}
.sec-title{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 10px}
/* route */
.route-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.route-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--surface2);font-size:13px}
.route-item:last-child{border-bottom:none}
.route-time{font-weight:700;color:var(--text);white-space:nowrap;min-width:42px;font-variant-numeric:tabular-nums}
.route-name{font-weight:600;color:var(--text)}
.route-tag{font-size:11px;color:var(--orange);font-weight:500}
.route-dur{font-size:12px;color:var(--text3);margin-left:auto;white-space:nowrap}
/* spots */
.spot-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s}
.spot-card:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.spot-thumb{width:64px;height:48px;border-radius:6px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.spot-thumb img{width:100%;height:100%;object-fit:cover}
.spot-info{flex:1;min-width:0}
.spot-name{font-size:13px;font-weight:600;color:var(--text)}
.spot-stars{font-size:11px;color:var(--yellow);margin-top:2px}
.spot-score{font-size:14px;font-weight:700;color:var(--text2);flex-shrink:0}
/* user shares */
.share-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.share-item{border-radius:var(--r);overflow:hidden;background:var(--surface2);aspect-ratio:4/3;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px}
/* hidden old panels for JS compat */
.panel-header{display:none}.card-nav{display:none}.panel-body{display:none}
#cardPages{display:flex;height:100%;transition:transform .3s ease}
.card-page{min-width:100%;width:100%;height:100%;overflow-y:auto;padding:12px;flex-shrink:0}
/* data cards */
.pt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.pt-card-head{padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--surface2);gap:8px}
.pt-name{font-size:14px;font-weight:700;color:var(--text)}
.pt-coord{font-size:11px;color:var(--text3);margin-top:2px;font-variant-numeric:tabular-nums}
.pt-actions{display:flex;gap:3px;flex-shrink:0}
.pt-act{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pt-act:hover{background:var(--surface2);color:var(--text2)}
.pt-act.del:hover{color:var(--red);border-color:rgba(239,68,68,.3);background:var(--red-soft)}
.pt-act.fav-on{color:var(--yellow);border-color:rgba(245,158,11,.3);background:var(--yellow-soft)}
.pt-body{padding:12px}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.data-cell{background:var(--surface2);border-radius:var(--r-sm);padding:10px 12px;border:1px solid var(--border)}
.dc-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dc-val{font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:var(--text)}
.dc-sub{font-size:11px;color:var(--text3);margin-top:4px}
.dc-unit{font-size:12px;color:var(--text3);margin-left:2px}
.dc-val.good{color:var(--green)}.dc-val.warn{color:var(--yellow)}.dc-val.bad{color:var(--red)}.dc-val.purple{color:var(--purple)}
.timeline{margin-bottom:10px}
.tl-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.tl-bar{height:4px;border-radius:2px;background:var(--surface3);position:relative;overflow:hidden;margin-bottom:5px}
.tl-fill{height:100%;border-radius:2px;position:absolute}
.tl-sun{background:linear-gradient(90deg,var(--orange),var(--yellow))}
.tl-times{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums}
.bortle-bar{display:flex;gap:2px;margin:6px 0 4px}
.bortle-seg{flex:1;height:4px;border-radius:2px}
.bortle-label{font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
/* modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);z-index:5000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);position:relative;max-height:90vh;overflow-y:auto;animation:popIn .2s ease both}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--surface2);border-radius:8px;padding:3px}
.modal-tab{flex:1;padding:7px;border-radius:6px;border:0;background:none;color:var(--text3);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit}
.modal-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.form-input:focus{border-color:var(--primary)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:flex;gap:8px}
.form-row .form-input{flex:1}
.send-code-btn{padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--primary);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s;flex-shrink:0;font-family:inherit}
.send-code-btn:hover{background:var(--surface3)}
.send-code-btn:disabled{color:var(--text3);cursor:not-allowed}
.submit-btn{width:100%;padding:12px;border-radius:10px;border:0;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s;font-family:inherit}
.submit-btn:hover{opacity:.9}
.submit-btn:active{transform:scale(.98)}
.form-error{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}
.form-switch{font-size:12px;color:var(--text3);text-align:center;margin-top:12px}
.form-switch a{color:var(--primary);cursor:pointer;font-weight:500}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.modal-close:hover{background:var(--surface3);color:var(--text)}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;margin-bottom:10px;overflow:hidden;color:#fff}
.profile-avatar img{width:80px;height:80px;border-radius:50%;object-fit:cover;display:block}
.profile-avatar-hint{font-size:11px;color:var(--text3)}
.fstar{font-size:24px;cursor:pointer;opacity:.25;transition:opacity .15s;color:var(--yellow)}
.fstar.on{opacity:1}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--surface2);cursor:pointer;font-size:13px;border-radius:8px}
.hist-item:hover{background:var(--surface2)}
.avatar-upload-wrap{position:relative;display:inline-block;cursor:pointer}
.avatar-upload-wrap:hover .avatar-overlay{opacity:1}
.avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:10px;color:#fff;font-weight:600}
.cropper-view-box,.cropper-face{border-radius:50%}
.cropper-view-box{outline:2px solid var(--primary)}
/* share modal */
.share-row-btn{width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;background:none;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:background .12s;text-align:left}
.share-row-btn:hover{background:var(--surface2)}
.share-row-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.share-row-label{flex:1;font-weight:500}
.share-row-arrow{color:var(--text3);font-size:16px}
/* toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:#fff;border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-md);color:var(--text)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{color:var(--green)}
#toast.error{color:var(--red)}
.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:13px;line-height:1.8}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* recommend (hidden) */
#quickGrid{display:none}#recommendPanel{display:none}
.style-chip{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.style-chip:hover{border-color:var(--primary);color:var(--primary)}
.style-chip.on{border-color:var(--primary);color:#fff;background:var(--primary)}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.rec-card:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.rec-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.rec-card-name{font-size:13px;font-weight:600;flex:1}
.rec-match{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.rec-match-num{font-size:18px;font-weight:700;line-height:1}
.rec-match-label{font-size:10px;color:var(--text3);margin-top:1px}
.rec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.rec-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.rec-bar{height:3px;border-radius:2px;background:var(--surface3);overflow:hidden;margin-bottom:6px}
.rec-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.rec-reason{font-size:11px;color:var(--text3);line-height:1.5}
.rec-coord{font-size:10px;color:var(--text3);margin-top:4px;font-variant-numeric:tabular-nums}
#nightOverlay{display:none}
/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes markerDrop{0%{opacity:0;transform:scale(0) translateY(-10px)}60%{transform:scale(1.15) translateY(2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes markerPulse{0%{box-shadow:0 0 0 0 rgba(42,109,240,.5)}70%{box-shadow:0 0 0 10px rgba(42,109,240,0)}100%{box-shadow:0 0 0 0 rgba(42,109,240,0)}}
@keyframes locPulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(3);opacity:0}}
/* leaflet popup override */
.leaflet-popup-content-wrapper{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-lg);border:1px solid var(--border);padding:0}
.leaflet-popup-content{margin:0;min-width:260px;max-width:380px}
.leaflet-popup-tip{background:#fff;border:1px solid var(--border)}
.leaflet-popup-close-button{color:var(--text3)!important;font-size:18px!important;top:8px!important;right:8px!important}
.map-popup{padding:14px}
.map-popup-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text)}
.map-popup-img{width:100%;height:120px;border-radius:8px;object-fit:cover;margin-bottom:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px}
.map-popup-row{font-size:12px;color:var(--text2);margin-bottom:4px}
.map-popup-row b{color:var(--text);font-weight:600}
/* scene system */
.scene-group-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:0 16px;margin:8px 0 6px}
#topSection{transition:max-height .3s ease,opacity .2s ease;overflow:hidden}
#topSection.collapsed{max-height:0!important;opacity:0;padding:0}
.scene-tag.multi{position:relative}
.scene-tag .check{display:none;margin-left:4px;font-size:10px}
.scene-tag.on .check{display:inline}
/* score card */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.score-label{font-size:13px;font-weight:600}
.score-badge{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.score-badge.good{color:var(--green)}.score-badge.ok{color:var(--yellow)}.score-badge.bad{color:var(--red)}
.score-verdict{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.score-verdict.good{background:var(--green-soft);color:var(--green)}
.score-verdict.ok{background:var(--yellow-soft);color:var(--yellow)}
.score-verdict.bad{background:var(--red-soft);color:var(--red)}
.factor-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.factor-name{font-size:11px;color:var(--text3);min-width:60px}
.factor-bar{flex:1;height:4px;border-radius:2px;background:var(--surface3);overflow:hidden}
.factor-fill{height:100%;border-radius:2px;transition:width .4s ease}
.factor-val{font-size:11px;font-weight:600;min-width:28px;text-align:right}
/* timeline */
.tl-chart{display:flex;align-items:flex-end;gap:1px;height:60px;margin:8px 0}
.tl-col{flex:1;border-radius:2px 2px 0 0;transition:height .3s ease;cursor:pointer;position:relative;min-width:0}
.tl-col:hover{opacity:.8}
.tl-col .tl-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:3px 6px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:10}
.tl-col:hover .tl-tip{display:block}
.tl-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:2px}
/* spot card enhanced */
.spot-card-v2{display:flex;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s}
.spot-card-v2:hover{border-color:var(--primary);box-shadow:var(--shadow-sm)}
.spot-thumb-v2{width:72px;height:54px;border-radius:6px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3)}
.spot-detail{flex:1;min-width:0}
.spot-detail-name{font-size:13px;font-weight:600}
.spot-detail-tip{font-size:11px;color:var(--text3);margin-top:2px}
.spot-detail-meta{display:flex;gap:8px;margin-top:4px;font-size:10px;color:var(--text3)}
.spot-detail-meta span{background:var(--surface2);padding:1px 6px;border-radius:4px}
/* star area circle */
.star-area-card{padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .15s}
.star-area-card:hover{border-color:var(--purple);box-shadow:var(--shadow-sm)}
.star-area-name{font-size:13px;font-weight:600;color:var(--text)}
.star-area-meta{font-size:11px;color:var(--text3);margin-top:4px}
.star-area-score{font-size:16px;font-weight:700;color:var(--purple)}
/* route */
.route-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--surface2);font-size:12px}
.route-step:last-child{border-bottom:none}
.route-num{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.route-info{flex:1}
.route-info-name{font-weight:600;font-size:13px}
.route-info-meta{color:var(--text3);margin-top:2px}
/* mode toggle */
.mode-toggle{display:flex;background:var(--surface2);border-radius:6px;padding:2px;margin-bottom:12px}
.mode-btn{flex:1;padding:5px 10px;border:none;border-radius:5px;background:none;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.mode-btn.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
/* community placeholder */
.community-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px}
.community-card-img{width:100%;aspect-ratio:16/9;border-radius:8px;background:var(--surface2);margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px}
.community-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
/* community photos */
.cp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.cp-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--surface2)}
.cp-body{padding:10px 12px}
.cp-user{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cp-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}
.cp-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cp-username{font-size:12px;font-weight:500;color:var(--text2)}
.cp-caption{font-size:12px;color:var(--text);margin-bottom:8px;line-height:1.4}
.cp-actions{display:flex;gap:12px}
.cp-action{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;padding:4px 0;transition:color .15s}
.cp-action:hover{color:var(--text2)}
.cp-action.liked{color:var(--red)}
.cp-action.saved{color:var(--yellow)}
.cp-action svg{width:14px;height:14px}
/* route/spot 可点击样式 */
.route-step{cursor:pointer;transition:background .15s;border-radius:8px;padding:10px;margin:0 -10px}
.route-step:hover{background:var(--surface2)}
.spot-card-v2{cursor:pointer}
/* 图片查看器（QQ风格，支持左右切换） */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9000;display:none;align-items:center;justify-content:center;cursor:zoom-out;user-select:none}
.img-viewer.open{display:flex}
.img-viewer img{max-width:85vw;max-height:85vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);object-fit:contain;cursor:default}
.img-viewer-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.img-viewer-close:hover{background:rgba(255,255,255,.25)}
.img-viewer-arrow{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.img-viewer-arrow:hover{background:rgba(255,255,255,.25)}
.img-viewer-arrow.left{left:20px}
.img-viewer-arrow.right{right:20px}
.img-viewer-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:13px}
.cp-comments{padding:8px 12px;border-top:1px solid var(--border);font-size:12px}
</style>
</head>

const API="http://47.116.30.220:8000";

function authHeaders(){return _token?{Authorization:"Bearer "+_token}:{}}
async function apiFetch(path,opts={}){
  const res=await fetch(API+path,{headers:{"Content-Type":"application/json",...authHeaders(),...(opts.headers||{})},...opts});
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.detail||"\u8bf7\u6c42\u5931\u8d25");
  return data;
}
function jsonp(url,timeout=8000){
  return new Promise((resolve,reject)=>{
    const cb="_gm_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const t=setTimeout(()=>{cleanup();reject(new Error("\u8d85\u65f6"));},timeout);
    function cleanup(){clearTimeout(t);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb+"&output=JSON";
    window[cb]=data=>{cleanup();resolve(data);};
    s.onerror=()=>{cleanup();reject(new Error("\u7f51\u7edc\u9519\u8bef"));};
    document.head.appendChild(s);
  });
}

const map=L.map('map',{zoomControl:false,preferCanvas:true}).setView([35,105],5);
L.control.zoom({position:'bottomright'}).addTo(map);
var _myLocMarker=null;
var _myLocAddr="";
function _showMyLocation(lat,lng,addr){
  _myLocAddr=addr||"";
  if(_myLocMarker){_myLocMarker.setLatLng([lat,lng]);_myLocMarker.setTooltipContent(addr||"\u6211\u7684\u4f4d\u7f6e");return;}
  var icon=L.divIcon({className:"",html:'<div style="position:relative"><div style="width:16px;height:16px;border-radius:50%;background:#2a6df0;border:3px solid #fff;box-shadow:0 0 0 2px rgba(42,109,240,.3),0 2px 8px rgba(0,0,0,.2)"></div><div style="position:absolute;top:-2px;left:-2px;width:20px;height:20px;border-radius:50%;background:rgba(42,109,240,.2);animation:locPulse 2s ease-out infinite"></div></div>',iconSize:[16,16],iconAnchor:[8,8]});
  _myLocMarker=L.marker([lat,lng],{icon:icon,zIndexOffset:1000}).addTo(map);
  _myLocMarker.bindTooltip(addr||"\u6211\u7684\u4f4d\u7f6e",{permanent:false,direction:"top",offset:[0,-10]});
}
// 高德逆地理编码：经纬度→具体地址（街道/楼栋级别）
function _reverseGeoAmap(lat,lng,cb){
  jsonp("https://restapi.amap.com/v3/geocode/regeo?key="+AMAP_KEY+"&location="+lng+","+lat+"&radius=50&extensions=base",5000)
    .then(function(r){
      var addr="";
      if(r.regeocode){
        var c=r.regeocode.addressComponent||{};
        var full=r.regeocode.formatted_address||"";
        // 优先用街道+门牌号级别
        var detail=[c.district,c.township,c.streetNumber&&c.streetNumber.street,c.streetNumber&&c.streetNumber.number,c.building&&c.building.name].filter(Boolean).join("");
        addr=detail||full;
      }
      cb(addr);
    }).catch(function(){cb("");});
}
// 双重定位：先高德IP快速定位→再GPS精确定位
(function initLocate(){
  // 第一步：高德IP定位（秒级，精度到区县）
  jsonp("https://restapi.amap.com/v3/ip?key="+AMAP_KEY,5000).then(function(r){
    if(r.rectangle){
      var pts=r.rectangle.split(";");
      if(pts.length>=2){
        var sw=pts[0].split(","),ne=pts[1].split(",");
        var lat=(parseFloat(sw[1])+parseFloat(ne[1]))/2;
        var lng=(parseFloat(sw[0])+parseFloat(ne[0]))/2;
        map.setView([lat,lng],14);
        _showMyLocation(lat,lng,(r.city||r.province||"")+"\u5b9a\u4f4d\u4e2d\u2026");
      }
    }
  }).catch(function(){});
  // 第二步：浏览器GPS精确定位（可能需要几秒）
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude;
    map.setView([lat,lng],17);
    // 用高德逆地理编码获取具体地址
    _reverseGeoAmap(lat,lng,function(addr){
      _showMyLocation(lat,lng,addr||"\u6211\u7684\u4f4d\u7f6e");
      if(addr)document.getElementById("infoBarText").textContent="\u5f53\u524d\u4f4d\u7f6e\uff1a"+addr;
    });
  },function(){},
  {timeout:15000,maximumAge:30000,enableHighAccuracy:true});
})();
const tileGlobal=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'\u00a9 Esri'}).addTo(map);
const tileBase=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18});
let tileLabel=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,opacity:.9});
function inChina(lat,lng){return lat>18&&lat<54&&lng>73&&lng<135;}
function updateTileSource(){
  const c=map.getCenter();
  if(inChina(c.lat,c.lng)){if(!map.hasLayer(tileBase))tileBase.addTo(map);if(CFG.label&&!map.hasLayer(tileLabel))tileLabel.addTo(map);}
  else{if(map.hasLayer(tileBase))map.removeLayer(tileBase);if(map.hasLayer(tileLabel))map.removeLayer(tileLabel);}
}
map.on('moveend',updateTileSource);
const CFG={h24:true,label:true};
function escH(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmtTemp(c){return Math.round(c)+"\u00b0C"}
function fmtTime(iso){if(!iso)return"--";const d=new Date(iso);return CFG.h24?d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false}):d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function dayFrac(iso){if(!iso)return 0;const d=new Date(iso);return(d.getHours()*60+d.getMinutes())/(24*60)}
function bestObsTime(sunriseIso,sunsetIso){
  if(!sunriseIso||!sunsetIso)return{start:"--",end:"--",peak:"--"};
  const sr=new Date(sunriseIso),ss=new Date(sunsetIso);
  const start=new Date(ss.getTime()+90*60000),end=new Date(sr.getTime()-90*60000);
  const peak=new Date((start.getTime()+end.getTime()+24*3600000)/2);
  const fmt=t=>fmtTime(t.toISOString());
  return{start:fmt(start),end:fmt(end),peak:`${String(peak.getHours()).padStart(2,"0")}:${String(peak.getMinutes()).padStart(2,"0")}`};
}
function moonPhase(date){
  const known=new Date("2000-01-06T18:14:00Z"),cycle=29.530588853;
  const phase=(((date-known)/(1000*60*60*24)%cycle)+cycle)%cycle,pct=phase/cycle;
  let name,emoji;
  if(pct<.03||pct>.97){name="\u65b0\u6708";emoji="\ud83c\udf11"}else if(pct<.22){name="\u5a25\u7709\u6708";emoji="\ud83c\udf12"}
  else if(pct<.28){name="\u4e0a\u5f26\u6708";emoji="\ud83c\udf13"}else if(pct<.47){name="\u76c8\u51f8\u6708";emoji="\ud83c\udf14"}
  else if(pct<.53){name="\u6ee1\u6708";emoji="\ud83c\udf15"}else if(pct<.72){name="\u4e8f\u51f8\u6708";emoji="\ud83c\udf16"}
  else if(pct<.78){name="\u4e0b\u5f26\u6708";emoji="\ud83c\udf17"}else{name="\u6b8b\u6708";emoji="\ud83c\udf18"}
  return{name,emoji,illum:Math.round(Math.abs(Math.cos(pct*2*Math.PI))*100)};
}
function estimateBortle(lat,lng){
  const cities=[[39.9,116.4,21],[31.2,121.5,24],[23.1,113.3,15],[30.6,104.1,16],[22.5,114.1,13],[29.6,106.5,8],[32.1,118.8,8],[30.3,120.2,7],[36.1,120.4,9],[34.3,108.9,8]];
  let min=9;
  for(const[clat,clng,pop]of cities){const d=Math.sqrt((lat-clat)**2+(lng-clng)**2)*111;const b=Math.max(1,Math.min(9,9-Math.log2(pop*80/Math.max(d,5)+1)*1.2));if(b<min)min=b;}
  return Math.round(min);
}
function bortleDesc(b){
  const d=["","极暗天空","真正暗天","农村天空","农村/郊区","郊区天空","明亮郊区","郊区/城市","城市天空","市中心"];
  const c=["","#34d399","#3b82f6","#a5d6ff","#d2a8ff","#fb923c","#fbbf24","#f87171","#f87171","#f87171"];
  return{desc:d[b]||"\u672a\u77e5",color:c[b]||"#55555e"};
}
function wmoDesc(code){
  if(code===0)return{text:"\u6674\u7a7a\u4e07\u91cc",icon:"\u2600\ufe0f"};if(code<=2)return{text:"\u5c11\u4e91",icon:"\ud83c\udf24\ufe0f"};
  if(code===3)return{text:"\u591a\u4e91",icon:"\u2601\ufe0f"};if(code<=49)return{text:"\u96fe/\u973e",icon:"\ud83c\udf2b\ufe0f"};
  if(code<=59)return{text:"\u6bdb\u6bdb\u96e8",icon:"\ud83c\udf26\ufe0f"};if(code<=69)return{text:"\u96e8",icon:"\ud83c\udf27\ufe0f"};
  if(code<=79)return{text:"\u96ea",icon:"\u2744\ufe0f"};if(code<=84)return{text:"\u9635\u96e8",icon:"\ud83c\udf26\ufe0f"};
  return{text:"\u96f7\u66b4",icon:"\u26c8\ufe0f"};
}
function windDir(deg){return["\u5317","\u4e1c\u5317","\u4e1c","\u4e1c\u5357","\u5357","\u897f\u5357","\u897f","\u897f\u5317"][Math.round(deg/45)%8]}
function visClass(km){return km>=20?"good":km>=10?"":km>=5?"warn":"bad"}
function cloudClass(pct){return pct<=20?"good":pct<=50?"warn":"bad"}
// history & favs
let _history=JSON.parse(localStorage.getItem("sm_history")||"[]");
let _favs=JSON.parse(localStorage.getItem("sm_favs")||"[]");
function saveHistory(pt){

  localStorage.setItem("sm_history",JSON.stringify(_history));
}
function isFav(lat,lng){return _favs.some(f=>Math.abs(f.lat-lat)<0.0001&&Math.abs(f.lng-lng)<0.0001)}
function toggleFav(lat,lng,name){
  if(isFav(lat,lng)){_favs=_favs.filter(f=>!(Math.abs(f.lat-lat)<0.0001&&Math.abs(f.lng-lng)<0.0001));toast("\u5df2\u53d6\u6d88\u6536\u85cf");}
  else{_favs.unshift({lat,lng,name,ts:Date.now()});toast("\u5df2\u6536\u85cf \u2605","success");}

// fetchPointData
async function fetchPointData(lat,lng,name){
  const pt={lat,lng,name,loading:true,data:null,err:null};
  addPoint(pt);
  try{
    const [wx,geo]=await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,cloud_cover,visibility&hourly=temperature_2m,cloud_cover,visibility&daily=sunrise,sunset,precipitation_sum&timezone=auto&forecast_days=1`).then(r=>r.json()),
      (async()=>{
        try{
          if(inChina(lat,lng)){
            const r=await jsonp(`https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}&location=${lng},${lat}&radius=500&extensions=base`);
            return r.regeocode?.formatted_address||name;
          } else {
            const r=await Promise.race([fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=zh`).then(r=>r.json()),new Promise((_,rej)=>setTimeout(()=>rej(),4000))]);
            if(r&&(r.city||r.locality||r.countryName)){return[r.locality||r.city,r.principalSubdivision,r.countryName].filter(Boolean).join(", ");}
            return name;
          }
        }catch{return name;}
      })()
    ]);
    const c=wx.current,d=wx.daily;
    const bortle=estimateBortle(lat,lng);const moon=moonPhase(new Date());const wmo=wmoDesc(c.weather_code);
    const sunrise=d.sunrise?.[0],sunset=d.sunset?.[0];
    const sunriseFrac=dayFrac(sunrise),sunsetFrac=dayFrac(sunset);
    const nightLen=Math.round((1-(sunsetFrac-sunriseFrac))*24*60);
    const vis=c.visibility/1000,wind=c.wind_speed_10m,humid=c.relative_humidity_2m,cloud=c.cloud_cover;
    const score=Math.round(Math.max(0,Math.min(100,(bortle<=3?100:bortle<=5?75:bortle<=7?45:20)*0.35+(cloud<=10?100:cloud<=30?75:cloud<=60?40:10)*0.30+(vis>=20?100:vis>=10?75:vis>=5?40:10)*0.20+(humid<=50?100:humid<=70?70:40)*0.15)));
    pt.loading=false;
    const srDate=sunrise?new Date(sunrise):null,ssDate=sunset?new Date(sunset):null;
    const goldenAM=srDate?{start:new Date(srDate-30*60000),end:new Date(srDate.getTime()+30*60000)}:null;
    const goldenPM=ssDate?{start:new Date(ssDate-30*60000),end:new Date(ssDate.getTime()+30*60000)}:null;
    const blueAM=srDate?{start:new Date(srDate-60*60000),end:new Date(srDate-15*60000)}:null;
    const bluePM=ssDate?{start:new Date(ssDate.getTime()+15*60000),end:new Date(ssDate.getTime()+60*60000)}:null;
    const sunDir=lat>=0?"\u6b63\u5357":"\u6b63\u5317";
    const dayOfYear=Math.round((new Date()-new Date(new Date().getFullYear(),0,0))/(1000*60*60*24));
    const decl=23.45*Math.sin((360/365*(dayOfYear-81))*Math.PI/180);
    const cosH0=-Math.tan(lat*Math.PI/180)*Math.tan(decl*Math.PI/180);
    const h0=Math.abs(cosH0)<=1?Math.acos(cosH0)*180/Math.PI:90;
    const srAz=Math.round(90-h0);
    const srDir=srAz<-10?"\u4e1c\u5317":srAz>10?"\u4e1c\u5357":"\u6b63\u4e1c";
    const ssDir=srAz<-10?"\u897f\u5317":srAz>10?"\u897f\u5357":"\u6b63\u897f";
    pt.data={addr:geo,temp:c.temperature_2m,feels:c.apparent_temperature,wmo,wind,windDir:windDir(c.wind_direction_10m),windDeg:c.wind_direction_10m,humid,cloud,vis,bortle,moon,sunrise,sunset,sunriseFrac,sunsetFrac,nightLen,score,goldenAM,goldenPM,blueAM,bluePM,sunDir,srDir,ssDir};
    pt.name=geo||name;
    saveHistory({lat,lng,name:pt.name});
  }catch(e){pt.loading=false;pt.err=e.message||"\u83b7\u53d6\u5931\u8d25";}
  renderPoints();
}

function updateNav(){

let _searchTimer=null;const searchInput=document.getElementById("searchInput");const searchDrop=document.getElementById("searchDrop");let _srItems=[],_srSel=-1;
async function doSearch(q){
  if(!q.trim()){searchDrop.style.display="none";return;}
  searchDrop.innerHTML='<div class="sr-item"><div><div class="sr-name" style="color:var(--text3)">\u641c\u7d22\u4e2d\u2026</div></div></div>';searchDrop.style.display="block";
  function showResults(items){
    if(!items.length){searchDrop.innerHTML='<div class="sr-item"><div><div class="sr-name" style="color:var(--text3)">\u672a\u627e\u5230</div></div></div>';return;}
    _srItems=items;_srSel=-1;
    searchDrop.innerHTML=_srItems.map((p,i)=>`<div class="sr-item" data-i="${i}"><div><div class="sr-name">${escH(p.name)}</div><div class="sr-addr">${escH(p.addr)}</div></div></div>`).join("");
    searchDrop.querySelectorAll(".sr-item").forEach(el=>{el.addEventListener("click",()=>{const p=_srItems[+el.dataset.i];map.setView([p.lat,p.lng],15);fetchPointData(p.lat,p.lng,p.name);searchDrop.style.display="none";searchInput.value="";});});
  }
  function fetchT(url,ms=5000){return Promise.race([fetch(url).then(r=>r.json()),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),ms))]);}
  const photonP=fetchT(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=8&lang=zh`,5000).then(data=>{if(!data?.features?.length)return null;return data.features.map(f=>{const p=f.properties;return{name:p.name||p.city||p.country||"\u672a\u77e5",addr:[p.city,p.state,p.country].filter(Boolean).join(", "),lat:f.geometry.coordinates[1],lng:f.geometry.coordinates[0]};});}).catch(()=>null);
  const amapP=new Promise(resolve=>{jsonp(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=8&page=1&extensions=base`,5000).then(r=>{const items=(r.pois||[]).map(p=>({name:p.name,addr:p.address||p.cityname||"",lat:parseFloat(p.location.split(",")[1]),lng:parseFloat(p.location.split(",")[0])}));resolve(items.length?items:null);}).catch(()=>resolve(null));});
  const [photonRes,amapRes]=await Promise.all([photonP,amapP]);
  const combined=[];if(photonRes)combined.push(...photonRes);
  if(amapRes){for(const a of amapRes){if(!combined.some(c=>Math.abs(c.lat-a.lat)<0.01&&Math.abs(c.lng-a.lng)<0.01))combined.push(a);}}
  if(combined.length){showResults(combined.slice(0,10));return;}
  searchDrop.innerHTML='<div class="sr-item"><div><div class="sr-name" style="color:var(--text3)">\u672a\u627e\u5230</div></div></div>';
}
searchInput.addEventListener("input",e=>{clearTimeout(_searchTimer);_searchTimer=setTimeout(()=>doSearch(e.target.value),350);});
searchInput.addEventListener("keydown",e=>{const items=searchDrop.querySelectorAll(".sr-item");if(e.key==="ArrowDown"){_srSel=Math.min(_srSel+1,items.length-1);items.forEach((el,i)=>el.classList.toggle("sel",i===_srSel));e.preventDefault();}else if(e.key==="ArrowUp"){_srSel=Math.max(_srSel-1,0);items.forEach((el,i)=>el.classList.toggle("sel",i===_srSel));e.preventDefault();}else if(e.key==="Enter"&&_srSel>=0){items[_srSel].click();}else if(e.key==="Escape"){searchDrop.style.display="none";}});

function getLocationTags(pt){
  const d=pt.data||{};const tags=[];
  if(d.bortle<=3)tags.push("\u661f\u7a7a","\u81ea\u7136","\u7559\u767d");else if(d.bortle<=5)tags.push("\u81ea\u7136\u98ce\u5149","\u6e05\u65b0");else if(d.bortle>=7)tags.push("\u57ce\u5e02\u591c\u666f","\u9ad8\u5bf9\u6bd4","\u57ce\u5e02");
  if(d.cloud<=20)tags.push("\u6674\u6717");if(d.cloud>60)tags.push("\u9634\u5929","\u4f4e\u9971\u548c");
  if(d.moon&&d.moon.illum<=20)tags.push("\u661f\u7a7a","\u591c\u665a");
  if(d.sunrise&&d.sunset)tags.push("\u65e5\u51fa\u65e5\u843d","\u6696\u8272");
  if(pt.lat>40||pt.lat<25)tags.push("\u81ea\u7136\u98ce\u5149");
  if(pt.lng>120&&pt.lat>20&&pt.lat<35)tags.push("\u6d77\u666f","\u84dd\u8c03");
  if(pt.lat>28&&pt.lat<32&&pt.lng>118&&pt.lng<122)tags.push("\u57ce\u5e02","\u4eba\u50cf");
  if(d.vis>=20)tags.push("\u81ea\u7136","\u7559\u767d");if(d.wind<=3)tags.push("\u6781\u7b80","\u957f\u66dd\u5149");
  return[...new Set(tags)];
}
function calcMatchScore(ptTags,selectedStyles){
  if(!selectedStyles.length)return{score:50,matched:[]};
  const wantTags=new Set(selectedStyles.flatMap(sid=>{const s=STYLE_DEFS.find(d=>d.id===sid);return s?s.tags:[];}));
  const matched=ptTags.filter(t=>wantTags.has(t));
  const userPrefs=(_user&&_user.preferences)||[];
  const bonus=userPrefs.filter(p=>ptTags.some(t=>t.includes(p)||p.includes(t))).length*8;
  return{score:Math.min(100,Math.round((matched.length/Math.max(wantTags.size,1))*100+bonus)),matched};
}
function genReason(matched,score){
  if(!matched.length)return"\u4e0e\u5f53\u524d\u504f\u597d\u5339\u914d\u5ea6\u8f83\u4f4e";
  const top=matched.slice(0,2).join("\u3001");
  if(score>=85)return"\u9ad8\u5ea6\u5339\u914d "+top;if(score>=60)return"\u7b26\u5408 "+top+" \u98ce\u683c";
  return"\u90e8\u5206\u5339\u914d "+top;
}

}
function renderRecCards(){
  const container=document.getElementById("recCards"),countEl=document.getElementById("recMatchCount");
  if(!_points.length){container.innerHTML='<div class="empty-state"><div class="empty-text">\u5148\u6dfb\u52a0\u5730\u70b9</div></div>';countEl.textContent="";return;}
  const scored=_points.filter(p=>p.data&&!p.loading&&!p.err).map(pt=>{const ptTags=getLocationTags(pt);const{score,matched}=calcMatchScore(ptTags,_selectedStyles);return{pt,ptTags,score,matched};}).sort((a,b)=>b.score-a.score);
  const high=scored.filter(s=>s.score>=60).length;countEl.textContent=high?high+"\u4e2a\u9ad8\u5339\u914d":"";
  if(!scored.length){container.innerHTML='<div class="empty-state"><div class="empty-text">\u52a0\u8f7d\u4e2d\u2026</div></div>';return;}

  }).join("");

  city:{cloud:.50,aqi:.50},
  snow:{temp:.40,cloud:.30,wind:.30},
  desert:{cloud:.40,wind:.30,visibility:.30},

  tide:{cloud:.30,wind:.30,golden:.40},

};
function _scoreFactor(name,wx,astro,lp,moon){
  var cloud=wx.cloud_cover||50,wind=wx.wind_speed_10m||5,vis=(wx.visibility||10000)/1000;
  var humid=wx.relative_humidity_2m||50,temp=wx.temperature_2m||15,precip=wx.precipitation||0,wcode=wx.weather_code||0;
  if(name==="cloud")return Math.max(0,100-cloud*1.2);
  if(name==="wind")return wind<=3?100:wind<=8?70:wind<=15?40:10;
  if(name==="visibility")return vis>=20?100:vis>=10?75:vis>=5?40:10;
  if(name==="humidity")return humid<=50?100:humid<=70?65:30;
  if(name==="temp")return Math.max(0,Math.min(100,100-Math.abs(temp-5)*3));
  if(name==="temp_below_zero")return temp<0&&humid>80?100:(temp<3?50:0);
  if(name==="temp_diff")return humid>70?Math.min(100,humid*1.2):humid*0.5;
  if(name==="light_pollution"){var b=lp.bortle||5;return Math.max(0,(9-b)/8*100);}
  if(name==="moon"){var il=moon.illumination||50;return Math.max(0,100-il*1.5);}
  if(name==="aqi")return 70; // no free AQI API, assume moderate
  if(name==="golden"||name==="blue"||name==="sunset_timing"){
    if(!astro.sunrise||!astro.sunset)return 50;
    var now=new Date(),targets=[];
    var sr=new Date(astro.sunrise),ss=new Date(astro.sunset);
    if(name==="golden"){targets=[new Date(sr-30*60000),new Date(sr.getTime()+30*60000),new Date(ss-30*60000),new Date(ss.getTime()+30*60000)];}
    else if(name==="blue"){targets=[new Date(sr-60*60000),new Date(sr-15*60000),new Date(ss.getTime()+15*60000),new Date(ss.getTime()+60*60000)];}
    else{targets=[new Date(ss-30*60000),ss,new Date(ss.getTime()+60*60000)];}
    var minD=Infinity;targets.forEach(function(t){var d=Math.abs(now-t)/1000;if(d<minD)minD=d;});
    return minD<1800?100:minD<7200?Math.max(10,100-(minD-1800)/54):10;
  }
  if(name==="rain_sun")return precip>0&&cloud<70?90:(precip>0?50:10);
  if(name==="storm_prob")return wcode>=95?100:(wcode>=80?60:10);
  if(name==="rain")return Math.max(0,100-precip*20);
  if(name==="snow_then_clear")return(wcode>=71&&wcode<=86&&cloud<40)?90:(cloud<30?50:10);
  return 50;
}
function _calcMoon(){
  var known=new Date("2000-01-06T18:14:00Z"),cycle=29.530588853,now=new Date();
  var phase=(((now-known)/86400000%cycle)+cycle)%cycle,pct=phase/cycle;
  var illum=Math.round(Math.abs(Math.cos(pct*2*Math.PI))*100);
  var name;
  if(pct<.03||pct>.97)name="\u65b0\u6708";else if(pct<.22)name="\u5a25\u7709\u6708";
  else if(pct<.28)name="\u4e0a\u5f26\u6708";else if(pct<.47)name="\u76c8\u51f8\u6708";
  else if(pct<.53)name="\u6ee1\u6708";else if(pct<.72)name="\u4e8f\u51f8\u6708";
  else if(pct<.78)name="\u4e0b\u5f26\u6708";else name="\u6b8b\u6708";
  return{name:name,illumination:illum};
}
function _calcBortle(lat,lng){
  var cities=[[39.9,116.4,21],[31.2,121.5,24],[23.1,113.3,15],[30.6,104.1,16],[22.5,114.1,13],[29.6,106.5,8],[32.1,118.8,8],[30.3,120.2,7],[36.1,120.4,9],[34.3,108.9,8]];
  var min=9;cities.forEach(function(c){var d=Math.sqrt(Math.pow(lat-c[0],2)+Math.pow(lng-c[1],2))*111;var b=Math.max(1,Math.min(9,9-Math.log2(c[2]*80/Math.max(d,5)+1)*1.2));if(b<min)min=b;});
  return{bortle:Math.round(min)};
}

    var temp=wx.temperature_2m||15;
    var wind=wx.wind_speed_10m||5;
    var humid=wx.relative_humidity_2m||50;
    allSpots.forEach(function(s){
      var score=50;// 基础分
      // 1.季节匹配
      if(s.scene==="snow"||s.scene==="snow_clear"||s.scene==="rime"){score+=(month>=11||month<=3)?25:-15;}// 冬季加分
      if(s.scene==="flower"){score+=(month>=2&&month<=5)?25:-20;}// 春季加分
      if(s.scene==="autumn"){score+=(month>=9&&month<=11)?25:-20;}// 秋季加分
      if(s.scene==="grassland"){score+=(month>=6&&month<=9)?25:-15;}// 夏季加分
      if(s.scene==="sea"||s.scene==="tide"){score+=(month>=5&&month<=10)?15:-10;}
      // 2.时间匹配
      if((hour>=5&&hour<=7)&&(s.best||"").indexOf("\u65e5\u51fa")>=0)score+=20;
      if((hour>=16&&hour<=19)&&(s.best||"").indexOf("\u65e5\u843d")>=0)score+=20;
      if((hour>=18&&hour<=22)&&(s.scene==="city_night"||s.scene==="light_trails"))score+=20;
      if((hour>=0||hour<=5)&&s.scene==="star")score+=25;
      if((hour>=6&&hour<=8)||(hour>=17&&hour<=19)){if(s.scene==="golden_hour")score+=20;}
      if((hour>=5&&hour<=6)||(hour>=18&&hour<=19)){if(s.scene==="blue_hour")score+=20;}
      // 3.天气匹配
      if(cloud<=20){// 晴天
        if(s.scene==="star")score+=20;
        if(s.scene==="snow"||s.scene==="snow_clear")score+=15;
        if(s.scene==="desert"||s.scene==="dunes")score+=15;
      }
      if(cloud>=60){// 多云
        if(s.scene==="sea_of_clouds")score+=20;
        if(s.scene==="fog")score+=15;
        score-=10;// 一般场景扣分
      }
      if(humid>=80&&temp<5){if(s.scene==="rime")score+=25;}// 高湿低温→雾凇
      if(humid>=70){if(s.scene==="sea_of_clouds"||s.scene==="fog")score+=15;}
      if(wind<=3){if(s.scene==="architecture"||s.scene==="blue_hour")score+=10;}// 无风适合长曝光
      if(wind>=15){score-=10;}// 大风扣分
      if(temp<0){if(s.scene==="snow"||s.scene==="rime"||s.scene==="snow_clear")score+=15;else score-=10;}
      if(temp>30){if(s.scene==="sea")score+=10;if(s.scene==="snow")score-=15;}
      // 4.距离衰减（近的加分）
      score+=Math.max(0,20-s.distance_km/100);
      s._sortScore=score;
    });
    allSpots.sort(function(a,b){return b._sortScore-a._sortScore;});
    // Star areas with arrival times
    var starAreas=null;
    if(_selectedScenes.indexOf("star")>=0){
      starAreas=DARK_AREAS.map(function(a){
        var dist=Math.round(Math.sqrt(Math.pow(myLat-a.lat,2)+Math.pow(myLng-a.lng,2))*111);
        var driveH=dist/80;var arr=new Date(now.getTime()+driveH*3600000);
        var bs=(4-a.bortle)/3*50,ds=Math.max(0,50-dist/50);
        return{name:a.name,center:{lat:a.lat,lng:a.lng},radius_km:a.radius_km,bortle:a.bortle,distance_km:dist,
          score:Math.round(Math.max(0,Math.min(100,bs+ds))),
          arrive_time:String(arr.getHours()).padStart(2,"0")+":"+String(arr.getMinutes()).padStart(2,"0"),
          drive_text:driveH<1?Math.round(driveH*60)+"\u5206\u949f":Math.floor(driveH)+"h"+Math.round((driveH%1)*60)+"m",
          reason:"Bortle "+a.bortle+" \u00b7 "+dist+"km"};
      }).sort(function(a,b){return a.distance_km-b.distance_km;});
    }
    renderSceneResults({scores:scores,star_areas:starAreas,spots:allSpots,route:allSpots.slice(0,8)});
    // 评估完成后自动跳到"推荐景点"面板
    switchPanel(1);
    document.getElementById("spotsEmpty").style.display = "none";
    // Fit map to all spots
    if(allSpots.length){
      var bounds=L.latLngBounds(allSpots.map(function(s){return[s.lat,s.lng];}));
      bounds.extend([myLat,myLng]);
      map.fitBounds(bounds,{padding:[30,30],maxZoom:8});
    }
    var top=scores[0];
    if(top)document.getElementById("infoBarText").textContent="\u5df2\u4e3a\u4f60\u627e\u5230 "+allSpots.length+" \u4e2a\u63a8\u8350\u666f\u70b9";
  }catch(e){toast(e.message||"\u8bc4\u4f30\u5931\u8d25","error");}
  btn.disabled=false;btn.textContent="\u5f00\u59cb\u8bc4\u4f30";
});


// Render scene evaluation results
function renderSceneResults(data){
  // Score cards
  var sc=document.getElementById("scoreCards");
  sc.innerHTML=data.scores.map(function(s){
    var cls=s.score>=70?"good":s.score>=40?"ok":"bad";
    var FACTOR_CN={cloud:"\u4e91\u91cf",wind:"\u98ce\u901f",visibility:"\u80fd\u89c1\u5ea6",humidity:"\u6e7f\u5ea6",temp:"\u6e29\u5ea6",light_pollution:"\u5149\u6c61\u67d3",moon:"\u6708\u5149",aqi:"\u7a7a\u6c14\u8d28\u91cf",golden:"\u9ec4\u91d1\u65f6\u6bb5",blue:"\u84dd\u8c03\u65f6\u6bb5",sunset_timing:"\u65e5\u843d\u65f6\u673a",rain_sun:"\u96e8\u540e\u9633\u5149",storm_prob:"\u96f7\u66b4\u6982\u7387",rain:"\u964d\u96e8",temp_below_zero:"\u4f4e\u6e29\u7ed3\u971c",temp_diff:"\u6e29\u5dee",snow_then_clear:"\u96ea\u540e\u653e\u6674"};
    var factorsHtml=Object.keys(s.factors).map(function(k){
      var v=s.factors[k];var c=v>=70?"var(--green)":v>=40?"var(--yellow)":"var(--red)";
      return '<div class="factor-row"><span class="factor-name">'+(FACTOR_CN[k]||k)+'</span><div class="factor-bar"><div class="factor-fill" style="width:'+v+'%;background:'+c+'"></div></div><span class="factor-val" style="color:'+c+'">'+v+'</span></div>';
    }).join("");
    var tlHtml="";
    if(s.timeline&&s.timeline.timeline){
      var tl=s.timeline.timeline;var maxS=Math.max.apply(null,tl.map(function(t){return t.score;}));
      tlHtml='<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">\u65f6\u95f4\u8f74</div><div class="tl-chart">'+tl.map(function(t){
        var h=Math.max(4,t.score/Math.max(maxS,1)*56);var c=t.score>=70?"var(--green)":t.score>=40?"var(--yellow)":"var(--red)";
        var time=t.time?t.time.split("T")[1]||t.time:"";
        return '<div class="tl-col" style="height:'+h+'px;background:'+c+'"><div class="tl-tip">'+time.substring(0,5)+" "+t.score+'\u5206</div></div>';
      }).join("")+'</div><div class="tl-labels"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:00</span></div>';
      if(s.timeline.best_window){tlHtml+='<div style="font-size:11px;color:var(--green);margin-top:4px">\u6700\u4f73\u65f6\u6bb5: '+s.timeline.best_window.start.split("T")[1].substring(0,5)+' (\u5747\u5206'+s.timeline.best_window.avg_score+')</div>';}
      tlHtml+='</div>';
    }
    return '<div class="score-card"><div class="score-header"><div><span class="score-label">'+s.label+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="score-verdict '+cls+'">'+s.verdict+'</span><span class="score-badge '+cls+'">'+s.score+'</span></div></div>'+factorsHtml+tlHtml+'</div>';
  }).join("");

  // Star areas
  var starSec=document.getElementById("starAreasSection");
  var starList=document.getElementById("starAreasList");
  // Clear old circles
  _starCircles.forEach(function(c){map.removeLayer(c);});_starCircles=[];
  if(data.star_areas&&data.star_areas.length){
    starSec.style.display="block";
    starList.innerHTML=data.star_areas.map(function(a){
      return '<div class="star-area-card" onclick="map.setView(['+a.center.lat+','+a.center.lng+'],8)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="star-area-name">'+escH(a.name)+'</div><div class="star-area-meta">'+a.reason+' \u00b7 '+a.drive_text+'</div><div style="font-size:11px;color:var(--green);margin-top:2px">\u9884\u8ba1\u5230\u8fbe '+a.arrive_time+'</div></div><div class="star-area-score">'+a.score+'</div></div></div>';
    }).join("");
    // Draw circles on map
    data.star_areas.forEach(function(a){
      var circle=L.circle([a.center.lat,a.center.lng],{radius:a.radius_km*1000,color:"#8b5cf6",fillColor:"#8b5cf6",fillOpacity:0.1,weight:2}).addTo(map);
      circle.bindTooltip(a.name+" (Bortle "+a.bortle+")",{permanent:false});
      _starCircles.push(circle);
    });
  }else{starSec.style.display="none";}

  // Spots — clear old markers first
  _spotMarkers.forEach(function(m){map.removeLayer(m);});_spotMarkers=[];
  var spotsSec=document.getElementById("spotsSection");
  var spotList=document.getElementById("spotList");
  if(data.spots&&data.spots.length){
    spotsSec.style.display="block";
    spotList.innerHTML=data.spots.map(function(s,i){
      var isFaved=JSON.parse(localStorage.getItem("sm_spot_favs")||"[]").indexOf(s.name)>=0;
      var w=s.weather||{};
      var tempStr=Math.round(w.temp)+"\u00b0C";
      return '<div class="spot-card-v2" style="position:relative;flex-direction:column;gap:8px" onclick="map.setView(['+s.lat+','+s.lng+'],15);showSpotPopup('+i+')">'+
        '<div style="display:flex;gap:10px;align-items:flex-start"><div class="spot-detail" style="flex:1"><div class="spot-detail-name">'+escH(s.name)+'</div><div class="spot-detail-tip">'+(s.pos?escH(s.pos):escH(s.tip))+'</div></div></div>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap"><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>'+tempStr+'</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>\u2601 '+w.cloud+'%</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>\u6e7f\u5ea6 '+w.humidity+'%</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>\u98ce '+w.wind+'m/s</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>\u80fd\u89c1\u5ea6 '+w.vis+'km</span></span></div>'+
        '<div style="display:flex;gap:6px;flex-wrap:wrap"><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>'+escH(s.lens)+'</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>'+s.distance_km+'km</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>\u5230\u8fbe '+s.arrive_time+'</span></span><span class="spot-detail-meta" style="display:inline-flex;gap:0;margin:0"><span>'+s.drive_text+'</span></span></div>'+
        '<div style="display:flex;justify-content:flex-end;gap:6px;margin-top:2px">'+
          '<button onclick="event.stopPropagation();openRoute('+i+')" style="padding:3px 10px;border-radius:5px;border:1px solid var(--primary);background:var(--primary-soft);color:var(--primary);font-size:11px;cursor:pointer;font-family:inherit">\u8def\u7ebf</button>'+
          '<button onclick="event.stopPropagation();openSpotComments(\''+escH(s.name).replace(/'/g,"\\'")+'\')" style="padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit">\u8bc4\u8bba</button>'+
          '<button onclick="event.stopPropagation();toggleSpotFav(\''+escH(s.name).replace(/'/g,"\\'")+'\',this)" style="padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:'+(isFaved?'var(--yellow-soft)':'var(--surface2)')+';color:'+(isFaved?'var(--yellow)':'var(--text3)')+';font-size:11px;cursor:pointer;font-family:inherit">'+(isFaved?'\u2605 \u5df2\u6536\u85cf':'\u2606 \u6536\u85cf')+'</button>'+
        '</div></div>';
    }).join("");
    window._evalSpots=data.spots;
    // Add markers to map
    data.spots.forEach(function(s,i){
      var mk=L.marker([s.lat,s.lng],{icon:L.divIcon({className:"",html:'<div style="width:12px;height:12px;border-radius:50%;background:#f97316;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map);
      mk.bindTooltip(s.name+" ("+s.arrive_time+")",{permanent:false,direction:"top"});
      mk.on("click",function(){showSpotPopup(i);});
      _spotMarkers.push(mk);
    });
  }else{spotsSec.style.display="none";}

}

// 图片查看器（QQ风格，支持左右切换）
var _viewerImages=[];var _viewerIdx=0;
function openImgViewer(src,images){
  if(images&&images.length){_viewerImages=images;_viewerIdx=Math.max(0,images.indexOf(src));}
  else{_viewerImages=[src];_viewerIdx=0;}
  _showViewerImg();
  document.getElementById("imgViewer").classList.add("open");
}
function _showViewerImg(){
  document.getElementById("imgViewerImg").src=_viewerImages[_viewerIdx];
  var counter=document.getElementById("imgViewerCounter");
  var watermark="";
  if(window._viewerImagesData&&window._viewerImagesData[_viewerIdx]){
    var d=window._viewerImagesData[_viewerIdx];
    watermark=(d.author?"\u00a9 "+d.author:"")+(d.caption?" \u00b7 "+d.caption:"");
  }
  counter.innerHTML=(_viewerImages.length>1?'<span>'+(_viewerIdx+1)+' / '+_viewerImages.length+'</span>':'')+
    (watermark?'<div style="margin-top:4px;font-size:12px;color:rgba(255,255,255,.8)">'+escH(watermark)+'</div>':'');
}
function viewerNav(dir){
  _viewerIdx=((_viewerIdx+dir)%_viewerImages.length+_viewerImages.length)%_viewerImages.length;
  _showViewerImg();
}
function closeImgViewer(){document.getElementById("imgViewer").classList.remove("open");}
document.addEventListener("keydown",function(e){
  if(!document.getElementById("imgViewer").classList.contains("open"))return;
  if(e.key==="Escape")closeImgViewer();
  else if(e.key==="ArrowLeft")viewerNav(-1);
  else if(e.key==="ArrowRight")viewerNav(1);
});

// ============================================================
//  三面板切换：场景评估 ← → 推荐景点 ← → 摄影社区
// ============================================================
var _panelIdx = 0;
var _panelIds = ["panelEval", "panelSpots", "panelCommunity"];
var _panelNames = ["\u573a\u666f\u8bc4\u4f30", "\u63a8\u8350\u666f\u70b9", "\u6444\u5f71\u793e\u533a"];
function switchPanel(idx){
  _panelIdx = ((idx % _panelIds.length) + _panelIds.length) % _panelIds.length;
  _panelIds.forEach(function(id,i){
    document.getElementById(id).style.display = i === _panelIdx ? "block" : "none";
  });
  document.getElementById("panelTitle").textContent = _panelNames[_panelIdx];
  if(_panelIdx === 2){ loadCommunityFeed(); }
}
document.getElementById("panelPrev").addEventListener("click", function(){ switchPanel(_panelIdx - 1); });
document.getElementById("panelNext").addEventListener("click", function(){ switchPanel(_panelIdx + 1); });

// 社区全局上传
document.getElementById("btnUploadCommunity").addEventListener("click", function(){
  if(!_token){openAuthModal();return;}
  document.getElementById("communityFileGlobal").click();
});
document.getElementById("communityFileGlobal").addEventListener("change", async function(e){
  var file = e.target.files[0]; if(!file) return;
  var self = this;
  // 构建景点列表供选择
  var allNames=[];
  Object.keys(SPOTS_DB).forEach(function(k){(SPOTS_DB[k]||[]).forEach(function(s){if(allNames.indexOf(s.name)<0)allNames.push(s.name);});});
  // 弹出选择框
  var html='<div style="max-height:300px;overflow-y:auto">'+allNames.map(function(n){
    return '<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'" onclick="window._uploadSpotName=\''+escH(n).replace(/'/g,"\\'")+'\';closeModal(\'spotPickerModal\')">'+escH(n)+'</div>';
  }).join("")+'</div>';
  // 创建临时modal
  var overlay=document.createElement("div");
  overlay.className="modal-overlay open";overlay.id="spotPickerModal";
  overlay.innerHTML='<div class="modal" style="max-width:360px;padding:20px"><button class="modal-close" onclick="closeModal(\'spotPickerModal\')">&#10005;</button><div class="modal-title" style="font-size:15px;margin-bottom:10px">\u9009\u62e9\u666f\u70b9</div><input class="form-input" placeholder="\u641c\u7d22\u666f\u70b9\u540d\u79f0\u2026" style="margin-bottom:8px;font-size:13px" oninput="var q=this.value.toLowerCase();this.nextElementSibling.querySelectorAll(\'div>div\').forEach(function(d){d.style.display=d.textContent.toLowerCase().includes(q)?\'\':\' none\'})"/>'+html+'</div>';
  overlay.addEventListener("click",function(ev){if(ev.target===overlay)closeModal("spotPickerModal");});
  document.body.appendChild(overlay);
  // 等待用户选择
  window._uploadSpotName=null;
  var checkInterval=setInterval(function(){
    if(!document.getElementById("spotPickerModal")){
      clearInterval(checkInterval);
      var spotName=window._uploadSpotName;
      if(!spotName){self.value="";return;}
      var caption=prompt("\u6dfb\u52a0\u8bf4\u660e\uff08\u53ef\u7559\u7a7a\uff09")||"";
      var reader=new FileReader();
      reader.onload=function(ev){
        var imgData=ev.target.result;
        (async function(){
          var saved=false;
          if(_token){try{var center=map.getCenter();var fd=new FormData();fd.append("file",file);var url=API+"/api/community/photos?spot_name="+encodeURIComponent(spotName)+"&lat="+center.lat+"&lng="+center.lng+"&caption="+encodeURIComponent(caption);var res=await fetch(url,{method:"POST",headers:{Authorization:"Bearer "+_token},body:fd});if(res.ok)saved=true;}catch(ex){}}
          if(!saved){var local=JSON.parse(localStorage.getItem("sm_community")||"[]");local.unshift({id:Date.now(),image:imgData,spot_name:spotName,caption:caption,likes:0,liked:false,saved:false,user:{username:(_user&&_user.username)||"\u6211",avatar:(_user&&_user.avatar)||""},created_at:new Date().toISOString()});if(local.length>50)local=local.slice(0,50);localStorage.setItem("sm_community",JSON.stringify(local));}
          loadCommunityFeed();
        })();
      };
      reader.readAsDataURL(file);
      self.value="";
    }
  },200);
});

// 加载社区照片流——优先后端，降级本地
async function loadCommunityFeed(){
  var container = document.getElementById("communityFeed");
  if(!_token){
    container.innerHTML = '<div style="text-align:center;padding:32px 16px;color:var(--text3);font-size:13px"><div style="margin-bottom:12px">🔒 登录后即可查看摄影社区</div><button onclick="openAuthModal()" style="padding:8px 20px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;cursor:pointer">登录 / 注册</button></div>';
    return;
  }
  // 我的点赞/收藏 tab 不需要选景点
  if(_cTab==="liked"||_cTab==="saved"){
    // 直接加载
  } else if(!window._filterSpot&&!window._currentCommunitySpot){
    // 显示景点搜索界面
    var allSpotNames=[];
    Object.keys(SPOTS_DB).forEach(function(k){(SPOTS_DB[k]||[]).forEach(function(s){if(allSpotNames.indexOf(s.name)<0)allSpotNames.push(s.name);});});
    container.innerHTML = '<div style="padding:8px 0"><input class="form-input" id="communitySpotSearch" placeholder="� 搜索景点名称…" style="width:100%;padding:8px 12px;font-size:13px;margin-bottom:10px"/><div id="communitySpotList">'+
      allSpotNames.slice(0,20).map(function(n){return '<div onclick="window._currentCommunitySpot=\''+escH(n).replace(/'/g,"\\'")+'\';loadCommunityFeed()" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;transition:background .12s" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'">📍 '+escH(n)+'</div>';}).join("")+
      '</div></div>';
    // 搜索过滤
    document.getElementById("communitySpotSearch").addEventListener("input",function(){
      var q=this.value.trim().toLowerCase();
      var filtered=q?allSpotNames.filter(function(n){return n.toLowerCase().indexOf(q)>=0;}):allSpotNames.slice(0,20);
      document.getElementById("communitySpotList").innerHTML=filtered.slice(0,20).map(function(n){return '<div onclick="window._currentCommunitySpot=\''+escH(n).replace(/'/g,"\\'")+'\';loadCommunityFeed()" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;transition:background .12s" onmouseover="this.style.background=\'var(--surface2)\'" onmouseout="this.style.background=\'\'">📍 '+escH(n)+'</div>';}).join("")||'<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">未找到匹配景点</div>';
    });
    return;
  }
  var spotFilter = window._filterSpot || window._currentCommunitySpot || null;
  if(window._filterSpot){window._currentCommunitySpot=window._filterSpot;window._filterSpot=null;}
  // 显示当前景点名
  var spotLabel = spotFilter ? '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;color:var(--text2)"><span>📍 '+escH(spotFilter)+'</span><button onclick="window._currentCommunitySpot=null;loadCommunityFeed()" style="margin-left:auto;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11px;cursor:pointer">返回</button></div><div id="spotRatingArea"></div>' : '';
  container.innerHTML = spotLabel+'<div style="text-align:center;padding:16px;color:var(--text3)"><span class="spinner"></span>\u52a0\u8f7d\u4e2d\u2026</div>';
  var allPhotos = [];
  var headers = _token ? {Authorization:"Bearer "+_token} : {};
  // 只加载当前景点的照片
  if(spotFilter){
    try{
      var res = await fetch(API+"/api/community/photos?spot_name="+encodeURIComponent(spotFilter),{headers:headers});
      if(res.ok){var data = await res.json();if(data.photos)allPhotos = data.photos.map(function(p){p.spot_name=spotFilter;return p;});}
    }catch(e){}
  }
  // 合并本地存储的照片（也按景点过滤）
  var local = JSON.parse(localStorage.getItem("sm_community")||"[]");
  if(spotFilter) local = local.filter(function(p){return p.spot_name===spotFilter;});
  allPhotos = allPhotos.concat(local);
  // 按时间排序
  allPhotos.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  // 按tab过滤
  if(_cTab==="liked")allPhotos=allPhotos.filter(function(p){return p.liked;});
  else if(_cTab==="saved")allPhotos=allPhotos.filter(function(p){return p.saved;});
  // 按景点过滤（从评论按钮进来时）
  if(window._filterSpot){allPhotos=allPhotos.filter(function(p){return p.spot_name===window._filterSpot;});window._filterSpot=null;}
  var emptyMsg=_cTab==="liked"?"\u8fd8\u6ca1\u6709\u70b9\u8d5e\u7684\u7167\u7247":_cTab==="saved"?"\u8fd8\u6ca1\u6709\u6536\u85cf\u7684\u7167\u7247":"\u8fd8\u6ca1\u6709\u7167\u7247\uff0c\u70b9\u51fb\u4e0a\u65b9\u201c\u4e0a\u4f20\u7167\u7247\u201d\u6210\u4e3a\u7b2c\u4e00\u4e2a\u5206\u4eab\u7684\u4eba";
  if(!allPhotos.length){
    container.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-size:12px">'+emptyMsg+'</div>';
    return;
  }
  var allImgUrls=allPhotos.slice(0,20).map(function(p){return p.image;});
  window._feedImgUrls=allImgUrls;
  container.innerHTML = allPhotos.slice(0,20).map(function(p){
    var av = (p.user&&p.user.avatar) ? '<img src="'+escH(p.user.avatar)+'"/>' : ((p.user&&p.user.username)||"U")[0].toUpperCase();
    var isLocal = !!(p.id && p.id > 1000000000000); // timestamp-based id = local
    return '<div class="cp-card">'+
      '<img class="cp-img" src="'+escH(p.image)+'" alt="photo" loading="lazy" style="cursor:pointer" onclick="openImgViewer(this.src,_feedImgUrls)"/>'+
      '<div class="cp-body">'+
        '<div class="cp-user"><div class="cp-avatar">'+av+'</div><span class="cp-username">'+escH((p.user&&p.user.username)||"\u533f\u540d")+'</span><span style="margin-left:auto;font-size:10px;color:var(--text3)">'+escH(p.spot_name||"")+'</span></div>'+
        (p.caption?'<div class="cp-caption">'+escH(p.caption)+'</div>':'')+
        '<div class="cp-actions">'+
          '<button class="cp-action'+(p.liked?' liked':'')+'" onclick="toggleLocalLike('+p.id+',this,'+(isLocal?"true":"false")+')">'+
            '<svg viewBox="0 0 24 24" fill="'+(p.liked?'currentColor':'none')+'" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+
            '<span>'+(p.likes||0)+'</span></button>'+
          '<button class="cp-action'+(p.saved?' saved':'')+'" onclick="toggleLocalSave('+p.id+',this,'+(isLocal?"true":"false")+')">'+
            '<svg viewBox="0 0 24 24" fill="'+(p.saved?'currentColor':'none')+'" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'+
            '<span>\u6536\u85cf</span></button>'+
          (isLocal?'':'<button class="cp-action" onclick="toggleComments('+p.id+',this.closest(\'.cp-card\'))">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+
            '<span>\u8bc4\u8bba</span></button>')+
        '</div>'+
        '<div class="cp-comments" id="comments-'+p.id+'" style="display:none"></div>'+
      '</div></div>';
  }).join("");
  // 加载景点评分
  if(spotFilter){var rArea=document.getElementById("spotRatingArea");if(rArea)loadSpotRating(spotFilter,rArea);}
}

// 点赞/收藏——支持本地和后端
function toggleLocalLike(id,btn,isLocal){
  if(isLocal){
    var local=JSON.parse(localStorage.getItem("sm_community")||"[]");
    var p=local.find(function(x){return x.id===id;});
    if(p){p.liked=!p.liked;p.likes=(p.likes||0)+(p.liked?1:-1);localStorage.setItem("sm_community",JSON.stringify(local));
      btn.classList.toggle("liked",p.liked);btn.querySelector("svg").setAttribute("fill",p.liked?"currentColor":"none");btn.querySelector("span").textContent=p.likes;}
  }else{togglePhotoLike(id,btn);}
}
function toggleLocalSave(id,btn,isLocal){
  if(isLocal){
    var local=JSON.parse(localStorage.getItem("sm_community")||"[]");
    var p=local.find(function(x){return x.id===id;});
    if(p){p.saved=!p.saved;localStorage.setItem("sm_community",JSON.stringify(local));
      btn.classList.toggle("saved",p.saved);btn.querySelector("svg").setAttribute("fill",p.saved?"currentColor":"none");toast(p.saved?"\u5df2\u6536\u85cf":"\u5df2\u53d6\u6d88","success");}
  }else{togglePhotoSave(id,btn);}
}

// 评论功能
async function toggleComments(photoId, card){
  var box = card.querySelector('.cp-comments');
  if(box.style.display!=='none'){box.style.display='none';return;}
  box.style.display='block';
  box.innerHTML='<div style="padding:8px;color:var(--text3);font-size:11px">加载中…</div>';
  try{
    var res=await fetch(API+"/api/community/photos/"+photoId+"/comments",{headers:authHeaders()});
    var data=await res.json();
    var comments=data.comments||[];
    var html=comments.map(function(c){
      var cav=(c.user&&c.user.avatar)?'<img src="'+escH(c.user.avatar)+'" style="width:20px;height:20px;border-radius:50%;object-fit:cover"/>':'<div style="width:20px;height:20px;border-radius:50%;background:var(--primary-soft);color:var(--primary);font-size:10px;display:flex;align-items:center;justify-content:center">'+((c.user&&c.user.username)||"U")[0].toUpperCase()+'</div>';
      return '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">'+cav+'<div><span style="font-size:11px;font-weight:600;color:var(--text)">'+escH((c.user&&c.user.username)||"匿名")+'</span><div style="font-size:12px;color:var(--text);margin-top:2px">'+escH(c.content)+'</div></div></div>';
    }).join("");
    if(!comments.length) html='<div style="padding:6px 0;font-size:11px;color:var(--text3)">暂无评论</div>';
    html+='<div style="display:flex;gap:6px;margin-top:8px"><input class="form-input" id="cmt-input-'+photoId+'" placeholder="写评论…" style="flex:1;padding:6px 10px;font-size:12px"/><button onclick="submitComment('+photoId+')" style="padding:6px 12px;border-radius:6px;border:none;background:var(--primary);color:#fff;font-size:12px;cursor:pointer;white-space:nowrap">发送</button></div>';
    box.innerHTML=html;
  }catch(e){box.innerHTML='<div style="padding:8px;color:var(--red);font-size:11px">加载失败</div>';}
}
async function submitComment(photoId){
  var input=document.getElementById('cmt-input-'+photoId);
  if(!input||!input.value.trim())return;
  try{
    await fetch(API+"/api/community/photos/"+photoId+"/comments",{method:"POST",headers:{"Content-Type":"application/json",...authHeaders()},body:JSON.stringify({content:input.value.trim()})});
    input.value="";
    var card=input.closest('.cp-card');
    toggleComments(photoId,card);toggleComments(photoId,card);// 关再开刷新
  }catch(e){toast("评论失败","error");}
}

// 景点评分
async function loadSpotRating(spotName,container){
  try{
    var res=await fetch(API+"/api/spots/"+encodeURIComponent(spotName)+"/rating",{headers:authHeaders()});
    var d=await res.json();
    renderStars(container,spotName,d.avg,d.count,d.my_score);
  }catch(e){}
}
function renderStars(container,spotName,avg,count,mySc){
  var html='<div style="display:flex;align-items:center;gap:6px;margin:6px 0">';
  for(var i=1;i<=5;i++){
    var filled=i<=mySc;
    html+='<span onclick="rateSpot(\''+escH(spotName)+'\','+i+',this.parentElement)" style="cursor:pointer;font-size:16px;color:'+(filled?'#f59e0b':'var(--text3)')+'">'+(filled?'★':'☆')+'</span>';
  }
  html+='<span style="font-size:11px;color:var(--text2);margin-left:4px">'+avg+' ('+count+'人评)</span></div>';
  container.innerHTML=html;
}
async function rateSpot(spotName,score,el){
  if(!_token){openAuthModal();return;}
  try{
    var res=await fetch(API+"/api/spots/"+encodeURIComponent(spotName)+"/rate",{method:"POST",headers:{"Content-Type":"application/json",...authHeaders()},body:JSON.stringify({score:score})});
    var d=await res.json();
    renderStars(el.parentElement,spotName,d.avg,d.count,d.my_score);
    toast("评分成功","success");
  }catch(e){toast("评分失败","error");}
}

// 社区子tab切换
var _cTab = "all";
function switchCommunityTab(tab){
  _cTab = tab;
  ["cTabAll","cTabLiked","cTabSaved"].forEach(function(id){
    document.getElementById(id).classList.toggle("on", id === "cTab" + tab.charAt(0).toUpperCase() + tab.slice(1));
  });
  loadCommunityFeed();
}
